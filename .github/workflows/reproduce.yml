name: Reproduce analyses

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  reproduce:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Reproduce analyses and figures
        run: python run_analysis.py

      - name: Report release version
        run: python run_analysis.py --version

      - name: Verify analytic completeness
        shell: python
        run: |
          import json
          from pathlib import Path

          summary = json.loads(Path("outputs/run_summary.json").read_text())
          expected = {
              "analysis_version": "1.2.0",
              "rows": 197,
              "participants": 22,
              "training_rows_available": 131,
              "transfer_rows_available": 66,
          }
          for key, value in expected.items():
              assert summary[key] == value, (key, summary[key], value)
          required = [
              "outputs/source_data/Fig2_adjusted_prediction_lines.csv",
              "outputs/tables/measurement_correlations.csv",
              "outputs/tables/baseline_coordination_adjusted_full_model.csv",
              "outputs/tables/transfer_estimated_marginal_means.csv",
              "outputs/tables/transfer_pairwise_contrasts_holm.csv",
              "outputs/tables/training_lt_rn_count_estimated_marginal_means.csv",
              "outputs/tables/training_lt_rn_duration_estimated_marginal_means.csv",
          ]
          for artifact in required:
              assert Path(artifact).is_file(), artifact
          print("Reported-analysis artifact checks passed.")

      - name: Verify TIFF encoding
        shell: python
        run: |
          from pathlib import Path
          from PIL import Image

          tiffs = sorted(Path("outputs/figures").glob("*.tiff"))
          assert len(tiffs) == 4, len(tiffs)
          for path in tiffs:
              with Image.open(path) as image:
                  assert image.mode == "RGB", (path, image.mode)
                  assert image.tag_v2.get(259) == 1, (path, image.tag_v2.get(259))
                  assert float(image.tag_v2.get(282)) == 600.0, path
                  assert float(image.tag_v2.get(283)) == 600.0, path
          print("TIFF encoding checks passed.")
